<div class="container">
  <span><img src="./assets/iconos/bombilla.svg" style="max-width: 40px; max-height: 40px;" alt="Imagen" class="img-fluid"></span>
  <span><b style="font-size: 1.8rem;">  Administrador</b></span>
  <hr>
  <h1>Crear usuario emprendedor</h1>
  <img src="./assets/imagenes/separador.jpg" style="max-width: 140px; max-height: 20px;" alt="Imagen" class="img-fluid">

  <div class="row">
    <div class="col-md-6">
      <div class="form-group">
        <label for="nombre">Nombre:</label>
        <input type="text" id="nombre" class="form-control" [(ngModel)]="nombre" placeholder="Nombre del emprendedor">
      </div>
    </div>
    <div class="col-md-6">
      <div class="form-group">
        <label for="correo">Correo:</label>
        <input type="email" id="correo" class="form-control" [(ngModel)]="correo" placeholder="Correo">
      </div>
    </div>
  </div>

  <div class="row">
    <div class="col-md-6">
      <div class="form-group">
        <label for="rol">Rol:</label>
        <select id="rol" class="form-control" [(ngModel)]="idRol" (change)="onRoleChange($event)" [disabled]="isOrientador">
          <option [value]="null">Escoja un rol</option>
          <option *ngFor="let rol of roles" [value]="rol.id">{{ rol.name }}</option>
        </select>
      </div>
    </div>
    <div class="col-md-6">
      <div class="form-group">
        <label for="password">Password:</label>
        <input type="password" id="password" class="form-control" [(ngModel)]="password" placeholder="Password">
      </div>
    </div>
  </div>

  <div class="row">
    <div class="col-md-12 d-flex flex-column align-items-center">
      <div class="form-group w-50" *ngIf="showGestorSelect">
        <label for="gestor">Orientador:</label>
        <select id="gestor" class="form-control" [(ngModel)]="idUsuarioCargado">
          <option [value]="null">Escoja un orientador</option>
          <option *ngFor="let gestor of gestores" [value]="gestor.id">{{ gestor.name }}</option>
        </select>
      </div>
      <div class="form-group d-flex justify-content-around w-50 mt-3">
        <button class="ideacion-button btn btn-primary" type="submit" (click)="emprendedorSave()">Continuemos</button>
        <button class="plus-button btn btn-secondary" (click)="homeRoute()">Volver al menú</button>
      </div>
    </div>
  </div>
</div>
